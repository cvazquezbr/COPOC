</style><style type="text/css" data-vite-dev-id="/app/src/index.css">/* =================================================================
   Global Styles & Background
================================================================= */

body {
  background-color: #f8fafc; /* Fallback for browsers that don't support gradients */
  background-image:
    radial-gradient(at 0% 0%, hsla(253, 100%, 95%, 1) 0px, transparent 50%),
    radial-gradient(at 50% 0%, hsla(200, 100%, 95%, 1) 0px, transparent 50%),
    radial-gradient(at 100% 0%, hsla(339, 100%, 95%, 1) 0px, transparent 50%);
  transition: background-color 0.3s ease;
}

body.dark-mode-active {
  background-color: #0f172a; /* Dark fallback */
  background-image:
    radial-gradient(at 0% 100%, hsla(253, 100%, 10%, 1) 0px, transparent 50%),
    radial-gradient(at 50% 100%, hsla(200, 100%, 10%, 1) 0px, transparent 50%),
    radial-gradient(at 100% 100%, hsla(339, 100%, 10%, 1) 0px, transparent 50%);
}

/* =================================================================
   Modern Scrollbar Styles
================================================================= */

/* Works on Firefox */
* {
  scrollbar-width: thin;
  scrollbar-color: #8b5cf6 #f8fafc;
}

.dark-mode-active * {
    scrollbar-color: #a78bfa #0f172a;
}

/* Works on Chrome, Edge, and Safari */
::-webkit-scrollbar {
  width: 12px;
  height: 12px;
}

::-webkit-scrollbar-track {
  background: #f8fafc;
}

.dark-mode-active ::-webkit-scrollbar-track {
    background: #0f172a;
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
  border-radius: 6px;
  border: 3px solid #f8fafc;
  background-clip: content-box;
}

.dark-mode-active ::-webkit-scrollbar-thumb {
    border-color: #0f172a;
}


::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
  background-clip: content-box;
}

/* Corner for when both horizontal and vertical scrollbars are present */
::-webkit-scrollbar-corner {
  background: transparent;
}
</style><style type="text/css" data-vite-dev-id="/app/src/components/LoadingDialog.css">.thinking-animation {
  display: flex;
  justify-content: center;
  align-items: center;
}

.thinking-animation .dot {
  width: 12px;
  height: 12px;
  margin: 0 4px;
  background-color: #8b5cf6;
  border-radius: 50%;
  animation: pulse 1.4s infinite ease-in-out both;
}

.thinking-animation .dot:nth-child(1) {
  animation-delay: -0.32s;
}

.thinking-animation .dot:nth-child(2) {
  animation-delay: -0.16s;
}

@keyframes pulse {
  0%, 80%, 100% {
    transform: scale(0);
  }
  40% {
    transform: scale(1.0);
  }
